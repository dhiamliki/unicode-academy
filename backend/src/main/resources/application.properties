# ===============================
# DATABASE
# ===============================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.encoding=${SPRING_SQL_INIT_ENCODING:UTF-8}
spring.jpa.defer-datasource-initialization=${SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION:true}

spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

server.port=${SERVER_PORT:8080}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.issuer=${JWT_ISSUER:unicode-academy}
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# SMTP configuration
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT_MS:5000}

app.mail.from=${APP_MAIL_FROM:no-reply@unicode.local}
app.mail.account-termination.enabled=${APP_MAIL_ACCOUNT_TERMINATION_ENABLED:true}
app.chat.retention-hours=${CHAT_RETENTION_HOURS:24}
app.chat.retention-cron=${CHAT_RETENTION_CRON:0 0 * * * *}
app.anthropic.api-key=${ANTHROPIC_API_KEY:}
app.code.execution.timeout-ms=${APP_CODE_EXECUTION_TIMEOUT_MS:6000}
app.code.execution.max-output-bytes=${APP_CODE_EXECUTION_MAX_OUTPUT_BYTES:65536}
app.code.execution.max-code-length=${APP_CODE_EXECUTION_MAX_CODE_LENGTH:20000}
app.code.execution.max-sql-rows=${APP_CODE_EXECUTION_MAX_SQL_ROWS:60}

logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.springframework.jdbc.datasource.init=${LOG_LEVEL_DATASOURCE_INIT:INFO}
