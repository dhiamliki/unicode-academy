name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw -B test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: unicode-frontend/package-lock.json

      - name: Install dependencies
        working-directory: unicode-frontend
        run: npm ci

      - name: Build frontend
        working-directory: unicode-frontend
        run: npm run build
